packages:
  - apps/*
  - packages/*
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.19
  vite-plus: 0.1.19
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.19

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry/cli'
  - '@tailwindcss/oxide'
  - esbuild
  - msgpackr-extract
  - sharp
  - workerd
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
